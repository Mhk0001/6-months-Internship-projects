<!DOCTYPE html>
<html lang="en">
<head>
    <title>Basic Calculator </title>
    <link rel="stylesheet" href ="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
</head>
<body>
<div class="calculator">
<input type="text" id="result" readonly>
    <div class="buttons">
<button onclick="clearScreen()">C</button> <!--clear button -->
<button class="operator" onclick="display('/')">/</button> <!--division button-->
<button class ="operator" onclick="display('*')">*</button> <!--multiply button-->
<button class ="operator" onclick="display('-')">-</button> <!--subtract button-->


<button onclick="display('7')">7</button>
<button onclick="display('8')">8</button>
<button onclick="display('9')">9</button>
<button class ="operator" onclick="display('+')">+</button> <!--addition button-->

<button onclick="display('4')">4</button>
<button onclick="display('5')">5</button>
<button onclick="display('6')">6</button>
<button  class ="operator"onclick="calculate()">=</button>

<button onclick="display('1')">1</button>
<button onclick="display('2')">2</button>
<button onclick="display('3')">3</button>
<button class ="operator" onclick="sqrt()">sqrt</button>


<button onclick="display('00')">00</button>
<button onclick="display('.')">.</button>
<button onclick="display('0')">0</button>
<button  class ="operator" onclick="backspace()">CORR</button>

    </div>
</div>
    <script src="script.js"></script>
    </body>
</html>
