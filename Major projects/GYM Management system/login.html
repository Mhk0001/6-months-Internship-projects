<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-box {
      background: #ffffff;
      padding: 35px;
      border-radius: 10px;
      width: 320px;
      box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
      color: #111;
      letter-spacing: 1px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 12px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 14px;
      transition: 0.3s;
    }

    input:focus {
      border-color: #e60000;
      box-shadow: 0 0 5px rgba(230, 0, 0, 0.5);
      outline: none;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #e60000;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #b30000;
    }

    .link {
      margin-top: 15px;
      font-size: 14px;
      color: #444;
    }

    .link a {
      color: #e60000;
      text-decoration: none;
      font-weight: bold;
    }

    .link a:hover {
      text-decoration: underline;
    }
    .back-btn {
  position: fixed;
  top: 20px;
  left: 20px;

  width: 45px;
  height: 45px;

  background: #e60000;   /* bright red */
  color: white;
  border: none;

  border-radius: 50%;
  cursor: pointer;

  font-size: 20px;
  font-weight: bold;

  display: flex;
  align-items: center;
  justify-content: center;

  box-shadow: 0 0 10px rgba(255, 0, 0, 0.7);

  z-index: 9999;
}
  </style>
</head>

<body>
<button class="back-btn" onclick="goBack('index.html')">←</button>
  <div class="login-box">
    <h2>LOGIN</h2>

    <form id="login-form">
      <input type="email" id="email" placeholder="Email Address" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit">Sign In</button>
    </form>

    <div class="link">
      Don't have an account? <a href="signup.html">Sign Up</a>
    </div>
  </div>
<script>
  function goBack(defaultPage) {
    if (document.referrer && document.referrer !== "") {
      window.history.back();
    } else {
      window.location.href = defaultPage;
    }
  }
</script>
  <script>
    document.getElementById('login-form').addEventListener('submit', function (e) {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      const users = JSON.parse(localStorage.getItem('users')) || [];

      const matchedUser = users.find(u => u.email === email && u.password === password);

      if (matchedUser) {
        localStorage.setItem('isLoggedIn', 'true');
        localStorage.setItem('loggedInUser', JSON.stringify(matchedUser));
        alert('Login successful!');
        window.location.href = 'dashboard.html';
      } else {
        alert('Invalid email or password!');
      }
    });
  </script>

</body>
</html>
