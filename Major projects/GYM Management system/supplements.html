<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Supplement Store</title>
  <link rel="stylesheet" href="style.css" />

  <style>
    

   .back-btn {
  position: fixed;
  top: 20px;
  left: 20px;

  width: 45px;
  height: 45px;

  background: #e60000;   /* bright red */
  color: white;
  border: none;

  border-radius: 50%;
  cursor: pointer;

  font-size: 20px;
  font-weight: bold;

  display: flex;
  align-items: center;
  justify-content: center;

  box-shadow: 0 0 10px rgba(255, 0, 0, 0.7);

  z-index: 9999;
}
  
    /* Container */
    .store-container {
      max-width: 1000px;
      margin: 40px auto;
      text-align: center;
    }

    .store-container h2 {
      margin-bottom: 30px;
      font-size: 32px;
      letter-spacing: 1px;
    }

    /* Grid Layout */
    .supplements-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 30px;
      padding: 20px;
    }

    /* Card Design */
    .supp-card {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      transition: 0.3s ease;
      box-shadow: 0 0 10px rgba(255, 0, 0, 0.2);
    }

    .supp-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
    }

    /* Image */
    .supp-card img {
      width: 100%;
      height: 160px;
      object-fit: contain;
      margin-bottom: 15px;
    }

    /* Title */
    .supp-card h3 {
      margin-bottom: 10px;
      font-size: 18px;
    }

    /* Price */
    .supp-card p {
      font-weight: bold;
      color: red;
      font-size: 16px;
    }

    /* Optional button (future upgrade) */
    .buy-btn {
      margin-top: 10px;
      padding: 8px 15px;
      background: red;
      border: none;
      color: white;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.3s;
    }

    .buy-btn:hover {
      background: darkred;
    }
  </style>

</head>
<body>
<button class="back-btn" onclick="goBack('dashboard.html')">←</button>
  <script>
    if (localStorage.getItem('isLoggedIn') !== 'true') {
      alert('Please login first!');
      window.location.href = 'login.html';
    }
  </script>
  <script>
  function goBack(defaultPage) {
    if (document.referrer && document.referrer !== "") {
      window.history.back();
    } else {
      window.location.href = defaultPage;
    }
  }
</script>
  <div class="store-container">
    <h2>Supplement Store</h2>

    <div class="supplements-grid">

      <div class="supp-card">
        <img src="assets/whey.png" alt="Whey Protein" />
        <h3>Whey Protein</h3>
        <p>₹2,499</p>
      </div>

      <div class="supp-card">
        <img src="assets/creatine.png.avif" alt="Creatine" />
        <h3>Creatine Monohydrate</h3>
        <p>₹999</p>
      </div>

      <div class="supp-card">
        <img src="assets/bcaa.png" alt="BCAA" />
        <h3>BCAA</h3>
        <p>₹1,499</p>
      </div>

    </div>
  </div>

</body>
</html>
