
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Bills</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      min-height:100vh;
      background: linear-gradient(135deg,#111,#1a1a1a,#2b0000);
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
      overflow-x:hidden;
      color:white;
    }

    /* Background Glow */
    body::before,
    body::after{
      content:"";
      position:absolute;
      width:300px;
      height:300px;
      background: rgba(255,0,0,0.2);
      filter: blur(120px);
      border-radius:50%;
      z-index:0;
    }

    body::before{
      top:-80px;
      left:-80px;
    }

    body::after{
      bottom:-80px;
      right:-80px;
    }

    /* Back Button */
    .back-btn{
      position: fixed;
      top: 20px;
      left: 20px;

      width:45px;
      height:45px;

      border:none;
      border-radius:50%;

      background:#ff1a1a;
      color:white;

      font-size:22px;
      cursor:pointer;

      display:flex;
      align-items:center;
      justify-content:center;

      box-shadow:0 0 15px rgba(255,0,0,0.7);

      transition:0.3s;
      z-index:999;
    }

    .back-btn:hover{
      transform:scale(1.1);
      background:#ff3333;
    }

    /* Main Container */
    .container{
      position:relative;
      z-index:1;

      width:100%;
      max-width:500px;

      background: rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.1);

      backdrop-filter: blur(12px);

      border-radius:20px;

      padding:30px;

      box-shadow:0 0 25px rgba(0,0,0,0.4);
    }

    /* Heading */
    .container h2{
      text-align:center;
      font-size:34px;
      margin-bottom:10px;
      color:#ff4d4d;
    }

    .subtitle{
      text-align:center;
      color:#ccc;
      margin-bottom:30px;
    }

    /* Inputs */
    .input-group{
      margin-bottom:18px;
    }

    .input-group input{
      width:100%;
      padding:14px;

      border:none;
      outline:none;

      border-radius:12px;

      background: rgba(255,255,255,0.08);
      color:white;

      font-size:15px;

      border:1px solid rgba(255,255,255,0.1);

      transition:0.3s;
    }

    .input-group input:focus{
      border-color:#ff1a1a;
      box-shadow:0 0 10px rgba(255,0,0,0.4);
    }

    .input-group input::placeholder{
      color:#bbb;
    }

    /* Buttons */
    .main-btn{
      width:100%;
      padding:14px;

      border:none;
      border-radius:12px;

      background:#ff1a1a;
      color:white;

      font-size:16px;
      font-weight:bold;

      cursor:pointer;

      transition:0.3s;
    }

    .main-btn:hover{
      background:#cc0000;
      transform:translateY(-2px);
    }

    /* Bills Section */
    .bills-section{
      margin-top:35px;
    }

    .bills-section h3{
      margin-bottom:20px;
      color:#fff;
      text-align:center;
    }

    /* Bill Cards */
    #bill-list{
      list-style:none;
    }

    #bill-list li{
      background: rgba(255,255,255,0.07);

      border:1px solid rgba(255,255,255,0.08);

      padding:15px;
      margin-bottom:15px;

      border-radius:14px;

      display:flex;
      justify-content:space-between;
      align-items:center;

      transition:0.3s;
    }

    #bill-list li:hover{
      transform:translateY(-3px);
      box-shadow:0 0 15px rgba(255,0,0,0.2);
    }

    .bill-info{
      line-height:1.5;
    }

    .member-name{
      font-size:16px;
      font-weight:bold;
    }

    .bill-amount{
      color:#ff4d4d;
      font-size:15px;
    }

    /* Delete Button */
    .delete-btn{
      background:#111;
      color:white;

      border:none;
      padding:8px 14px;

      border-radius:8px;

      cursor:pointer;
      transition:0.3s;
    }

    .delete-btn:hover{
      background:#333;
    }

    /* Clear Button */
    .clear-btn{
      width:100%;
      margin-top:20px;

      background:#111;
    }

    .clear-btn:hover{
      background:#333;
    }

    /* Responsive */
    @media(max-width:600px){

      .container{
        padding:22px;
      }

      .container h2{
        font-size:28px;
      }

      #bill-list li{
        flex-direction:column;
        align-items:flex-start;
        gap:12px;
      }

      .delete-btn{
        width:100%;
      }
    }

  </style>
</head>

<body>

  <!-- Back Button -->
  <button class="back-btn" onclick="goBack()">←</button>

  <!-- Login Check -->
  <script>
    if (localStorage.getItem('isLoggedIn') !== 'true') {
      alert('Please login first!');
      window.location.href = 'login.html';
    }
  </script>

  <!-- Main Container -->
  <div class="container">

    <h2>Manage Bills</h2>
    <p class="subtitle">Generate and manage gym member bills</p>

    <!-- Form -->
    <form id="bill-form">

      <div class="input-group">
        <input
          type="text"
          id="bill-member"
          placeholder="Enter Member Name"
          required
        />
      </div>

      <div class="input-group">
        <input
          type="number"
          id="bill-amount"
          placeholder="Enter Amount (₹)"
          required
        />
      </div>

      <button type="submit" class="main-btn">
        Generate Bill
      </button>

    </form>

    <!-- Bills -->
    <div class="bills-section">

      <h3>Generated Bills</h3>

      <ul id="bill-list"></ul>

      <button onclick="clearBills()" class="main-btn clear-btn">
        Clear All Bills
      </button>

    </div>

  </div>

  <!-- Firebase Script -->
  <script type="module">

    import { db } from "./firebase.js";

    import {
      collection,
      addDoc,
      getDocs,
      deleteDoc,
      doc
    }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const form = document.getElementById("bill-form");
    const list = document.getElementById("bill-list");

    form.addEventListener("submit", async (e) => {

      e.preventDefault();

      const name =
      document.getElementById("bill-member").value;

      const amount =
      document.getElementById("bill-amount").value;

      await addDoc(collection(db, "bills"), {
        name,
        amount
      });

      form.reset();

      loadBills();
    });

    async function loadBills(){

      list.innerHTML = "";

      const snapshot =
      await getDocs(collection(db, "bills"));

      snapshot.forEach((docSnap) => {

        const li =
        document.createElement("li");

        li.innerHTML = `

          <div class="bill-info">

            <div class="member-name">
              ${docSnap.data().name}
            </div>

            <div class="bill-amount">
              ₹${docSnap.data().amount}
            </div>

          </div>

        `;

        const btn =
        document.createElement("button");

        btn.textContent = "Delete";

        btn.classList.add("delete-btn");

        btn.onclick = async () => {

          await deleteDoc(
            doc(db, "bills", docSnap.id)
          );

          loadBills();
        };

        li.appendChild(btn);

        list.appendChild(li);

      });
    }

    window.clearBills = async () => {

      const snapshot =
      await getDocs(collection(db, "bills"));

      snapshot.forEach(async (d) => {

        await deleteDoc(
          doc(db, "bills", d.id)
        );

      });

      loadBills();
    };

    loadBills();

  </script>

  <!-- Back Function -->
  <script>

    function goBack(){

      if(document.referrer &&
         document.referrer !== ""){

        window.history.back();

      } else {

        window.location.href =
        "dashboard.html";

      }
    }

  </script>

</body>
</html>
